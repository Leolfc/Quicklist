<!doctype html>
<html lang="pt-br">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quicklist</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <header>
      <img src="img/logo.png" alt="" />
    </header>
    <main>
      <form action="">
        <a href="#" class="back">
          <img src="img/link button.png" alt="" />
        </a>
        <h1>Compras da semana</h1>
        <div class="container_input">
          <input
            type="text"
            name=""
            id="input_item"
            placeholder="Adicione um novo item"
          />
          <button class="add">Adicionar item</button>
        </div>
      </form>
      <section class="list_item">
        <ul class="item-padrao">
          <li>
            <div class="container_name_item">
              <input class="input-task" type="checkbox" />
              <span>Pão de forma</span>
            </div>

            <button class="delete">
              <img src="img/Frame-2.png" alt="" />
            </button>
          </li>

          <li>
            <div class="container_name_item">
              <input class="input-task" type="checkbox" />
              <span>Café preto</span>
            </div>

            <button class="delete">
              <img src="img/Frame-2.png" alt="" />
            </button>
          </li>
          <li>
            <div class="container_name_item">
              <input class="input-task" type="checkbox" />
              <span>Suco de laranja</span>
            </div>

            <button class="delete">
              <img src="img/Frame-2.png" alt="" />
            </button>
          </li>
          <li>
            <div class="container_name_item">
              <input class="input-task" type="checkbox" />
              <span>Bolacha</span>
            </div>
            <button class="delete">
              <img src="img/Frame-2.png" alt="" />
            </button>
          </li>
        </ul>
        <p class="warning">
          <img src="img/warning-circle-filled.png" alt="" />
          O item foi removido da lista
          <img class="warning_remove" src="img/deleteSmall.svg" alt="" />
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
